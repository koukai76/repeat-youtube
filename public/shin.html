<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube 埋め込みビューア（完全版）</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 800px;
        margin: auto;
      }
      input {
        width: 80%;
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        margin-left: 10px;
      }
      iframe {
        width: 100%;
        height: 450px;
        margin-top: 20px;
        border: none;
      }
      .error {
        color: red;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>YouTube 埋め込みビューア（完全版）</h2>
    <p>YouTube の URL を入力してください：</p>

    <input
      id="urlInput"
      type="text"
      placeholder="https://www.youtube.com/watch?v=xxxx"
    />
    <button onclick="loadVideo()">表示</button>

    <div id="error" class="error"></div>

    <iframe id="player" src="" allowfullscreen></iframe>

    <script>
      function loadVideo() {
        const url = document.getElementById('urlInput').value.trim();
        const errorBox = document.getElementById('error');
        errorBox.textContent = '';

        const videoId = extractVideoId(url);

        if (!videoId) {
          errorBox.textContent = '正しい YouTube URL を入力してください。';
          return;
        }

        const embedUrl = `https://www.youtube.com/embed/${videoId}`;

        document.getElementById('player').src = embedUrl;
      }

      // YouTube URL から動画IDを抽出（完全版）
      function extractVideoId(url) {
        try {
          const u = new URL(url);

          // watch?v=xxxx
          if (u.searchParams.get('v')) {
            return u.searchParams.get('v');
          }

          // youtu.be/xxxx
          if (u.hostname === 'youtu.be') {
            return u.pathname.slice(1);
          }

          // /embed/xxxx
          if (u.pathname.startsWith('/embed/')) {
            return u.pathname.split('/')[2];
          }

          // /shorts/xxxx
          if (u.pathname.startsWith('/shorts/')) {
            return u.pathname.split('/')[2];
          }

          return null;
        } catch (e) {
          return null;
        }
      }
    </script>
  </body>
</html>
